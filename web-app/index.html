<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLE 模块化排插 · 控制台</title>
<style>
  :root {
    --bg: #0f1119;
    --surface: #1a1d2e;
    --card: #21243d;
    --text: #e4e6f0;
    --muted: #8b8fa8;
    --accent: #4f8fff;
    --on: #00e676;
    --off: #555;
    --danger: #ff5252;
    --warn: #ffab40;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .app { max-width: 800px; width: 100%; }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap; gap: 0.5rem;
  }
  .header h1 { font-size: 1.5rem; font-weight: 600; }
  .status {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0.9rem; border-radius: 20px;
    font-size: 0.85rem; font-weight: 500;
  }
  .status.connected { background: #00e67622; color: var(--on); }
  .status.disconnected { background: #ff525222; color: var(--danger); }
  .status.connecting { background: #ffab4022; color: var(--warn); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .connected .dot { background: var(--on); }
  .disconnected .dot { background: var(--danger); }
  .connecting .dot { background: var(--warn); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Buttons */
  .btn {
    padding: 0.5rem 1.2rem; border: none; border-radius: 8px;
    cursor: pointer; font-size: 0.9rem; font-weight: 500;
    transition: all 0.15s;
  }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.primary:hover { background: #3d7be6; }
  .btn.danger { background: var(--danger); color: #fff; }
  .btn.danger:hover { background: #e04848; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  /* Totals bar */
  .totals {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 0.75rem; margin-bottom: 1.5rem;
  }
  .stat {
    background: var(--surface); border-radius: var(--radius);
    padding: 1rem; text-align: center;
  }
  .stat .value { font-size: 1.4rem; font-weight: 700; }
  .stat .label { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
  .stat .value.on { color: var(--on); }

  /* Socket Grid */
  .socket-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0.75rem; margin-bottom: 1.5rem;
  }
  .socket-card {
    background: var(--card); border-radius: var(--radius);
    padding: 1rem; border: 2px solid transparent;
    transition: border-color 0.2s;
  }
  .socket-card.on { border-color: var(--on); }
  .socket-card .slot-name { font-weight: 600; margin-bottom: 0.5rem; }
  .socket-card .slot-meta {
    font-size: 0.8rem; color: var(--muted); margin-bottom: 0.75rem;
    line-height: 1.4;
  }
  .socket-card .toggle {
    width: 100%; padding: 0.4rem; border: none; border-radius: 6px;
    cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.15s;
  }
  .toggle.on { background: var(--on); color: #000; }
  .toggle.off { background: var(--off); color: #ccc; }

  /* Notifications */
  .notify-section {
    background: var(--surface); border-radius: var(--radius);
    padding: 1rem; margin-bottom: 1.5rem;
  }
  .notify-section h3 { font-size: 0.95rem; margin-bottom: 0.5rem; }
  .notify-row { display: flex; gap: 0.5rem; }
  .notify-row input {
    flex: 1; padding: 0.5rem; border-radius: 6px;
    border: 1px solid #333; background: var(--card); color: var(--text);
  }

  /* Log */
  .log {
    background: var(--surface); border-radius: var(--radius);
    padding: 0.75rem 1rem; max-height: 200px; overflow-y: auto;
  }
  .log h3 { font-size: 0.95rem; margin-bottom: 0.5rem; }
  .log-entry { font-size: 0.8rem; color: var(--muted); padding: 0.15rem 0; }
  .log-entry .ts { color: var(--accent); margin-right: 0.5rem; }

  /* Responsive */
  @media (max-width: 600px) {
    .header h1 { font-size: 1.2rem; }
    .stat .value { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>⚡ BLE 模块化排插</h1>
    <div class="status disconnected" id="statusBadge">
      <span class="dot"></span>
      <span id="statusText">未连接</span>
    </div>
    <div class="btn-group">
      <button class="btn primary" id="btnConnect" onclick="connect()">连接设备</button>
      <button class="btn danger" id="btnDisconnect" onclick="disconnect()" disabled>断开</button>
    </div>
    <label style="font-size:0.85rem;color:var(--muted);display:flex;align-items:center;gap:0.3rem;">
      <input type="checkbox" id="autoReconnect" checked> 自动重连
    </label>
  </div>

  <!-- Power Totals -->
  <div class="totals">
    <div class="stat"><div class="value" id="valVoltage">---</div><div class="label">电压 (V)</div></div>
    <div class="stat"><div class="value" id="valCurrent">---</div><div class="label">电流 (A)</div></div>
    <div class="stat"><div class="value on" id="valPower">---</div><div class="label">功率 (W)</div></div>
    <div class="stat"><div class="value" id="valEnergy">---</div><div class="label">累计电量 (kWh)</div></div>
    <div class="stat"><div class="value" id="valPF">---</div><div class="label">功率因数</div></div>
  </div>

  <!-- Socket Grid -->
  <div class="socket-grid" id="socketGrid">
  </div>

  <!-- Notification Push -->
  <div class="notify-section">
    <h3>📩 推送通知到排插屏幕</h3>
    <div class="notify-row">
      <input type="text" id="notifyText" placeholder="输入通知文本…" maxlength="175">
      <button class="btn primary" onclick="sendNotification()">发送</button>
    </div>
  </div>

  <!-- Event Log -->
  <div class="log">
    <h3>📋 事件日志</h3>
    <div id="logEntries">
      <div class="log-entry"><span class="ts">--:--</span>等待连接…</div>
    </div>
  </div>
</div>

<script>
// ================================================================
// BLE Constants — MUST match firmware ble_gatt.c
// ================================================================
const PS_SERVICE_UUID = 'd4e8a000-a0b2-4b9a-9c7e-3c5a8b9c0d1e';
const CHAR_MODULE_STATUS  = 'd4e8a001-a0b2-4b9a-9c7e-3c5a8b9c0d1e';
const CHAR_POWER_READINGS = 'd4e8a002-a0b2-4b9a-9c7e-3c5a8b9c0d1e';
const CHAR_SOCKET_CONTROL = 'd4e8a003-a0b2-4b9a-9c7e-3c5a8b9c0d1e';
const CHAR_NOTIFICATION   = 'd4e8a004-a0b2-4b9a-9c7e-3c5a8b9c0d1e';
const CHAR_SYSTEM_COMMAND = 'd4e8a006-a0b2-4b9a-9c7e-3c5a8b9c0d1e';
const CHAR_TIME_SYNC      = 'd4e8a008-a0b2-4b9a-9c7e-3c5a8b9c0d1e';

// ================================================================
// State
// ================================================================
let device = null;
let server = null;
let service = null;
let powerChar = null;
let statusChar = null;
let controlChar = null;
let notifyChar = null;

// Per-slot state (Phase 1: only slot 0 is physically connected)
const slots = [
  { name: '插槽 1', type: 'AC 插座', on: false },
  { name: '插槽 2', type: '(空)', on: false },
  { name: '插槽 3', type: '(空)', on: false },
  { name: '插槽 4', type: '(空)', on: false },
];

// ================================================================
// UI Helpers
// ================================================================

function setStatus(state, text) {
  const badge = document.getElementById('statusBadge');
  badge.className = 'status ' + state;
  document.getElementById('statusText').textContent = text;
  document.getElementById('btnConnect').disabled = (state === 'connected' || state === 'connecting');
  document.getElementById('btnDisconnect').disabled = (state !== 'connected');
}

function log(msg) {
  const now = new Date();
  const ts = now.toTimeString().slice(0, 8);
  const container = document.getElementById('logEntries');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="ts">${ts}</span>${msg}`;
  container.prepend(entry);
  if (container.children.length > 50) container.lastChild.remove();
}

function renderSockets() {
  const grid = document.getElementById('socketGrid');
  grid.innerHTML = slots.map((s, i) => `
    <div class="socket-card ${s.on ? 'on' : ''}" id="card${i}">
      <div class="slot-name">🔌 ${s.name}</div>
      <div class="slot-meta">${s.type}</div>
      <button class="toggle ${s.on ? 'on' : 'off'}" onclick="toggleSocket(${i})"
              ${!device || !server?.connected ? 'disabled' : ''}>
        ${s.on ? '● 开' : '○ 关'}
      </button>
    </div>
  `).join('');
}

function updatePowerUI(data) {
  document.getElementById('valVoltage').textContent = data.voltage.toFixed(1);
  document.getElementById('valCurrent').textContent = data.current.toFixed(3);
  document.getElementById('valPower').textContent = data.power.toFixed(1);
  document.getElementById('valEnergy').textContent = (data.energy_wh / 1000).toFixed(3);
  document.getElementById('valPF').textContent = data.power_factor.toFixed(2);
}

// ================================================================
// BLE Data Parsing
// ================================================================

function parsePowerReadings(buffer) {
  const v = new DataView(buffer);
  return {
    voltage:       ((v.getUint8(0) << 8) | v.getUint8(1)) / 10,
    current:       ((v.getUint8(2) << 8) | v.getUint8(3)) / 1000,
    power:         ((v.getUint8(4) << 24) | (v.getUint8(5) << 16) | (v.getUint8(6) << 8) | v.getUint8(7)) / 1000,
    energy_wh:     ((v.getUint8(8) << 24) | (v.getUint8(9) << 16) | (v.getUint8(10) << 8) | v.getUint8(11)),
    power_factor:  v.getUint8(12) / 100,
    frequency:     v.getUint8(13) / 10,
  };
}

function parseModuleStatus(buffer) {
  const v = new DataView(buffer);
  const numSlots = v.getUint8(0);
  for (let i = 0; i < Math.min(numSlots, 4); i++) {
    const off = 1 + i * 4;
    const type = v.getUint8(off);
    const status = v.getUint8(off + 1);
    const typeNames = {
      0x00: '(空)', 0x01: 'AC 插座', 0x02: 'USB 充电',
      0x03: '温湿度传感器', 0x04: '光照传感器', 0x05: '人体传感器',
      0x06: '小夜灯', 0x07: '功率计', 0x08: '无线充电', 0x09: '风扇',
    };
    slots[i].type = typeNames[type] || `模块 0x${type.toString(16)}`;
    slots[i].on = (status & 0x01) !== 0;
  }
  renderSockets();
}

// ================================================================
// BLE Connection
// ================================================================

async function connect() {
  if (!navigator.bluetooth) {
    alert('您的浏览器不支持 Web Bluetooth API。请使用 Chrome 或 Edge。');
    return;
  }

  setStatus('connecting', '连接中…');
  log('正在搜索设备…');

  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [PS_SERVICE_UUID] }],
      optionalServices: ['device_information'],
    });

    log(`已选择设备: ${device.name || '未知设备'}`);

    device.addEventListener('gattserverdisconnected', onDisconnect);

    server = await device.gatt.connect();
    log('GATT 已连接');

    service = await server.getPrimaryService(PS_SERVICE_UUID);
    log('Power Strip Service 已找到');

    // Get characteristics
    powerChar = await service.getCharacteristic(CHAR_POWER_READINGS);
    statusChar = await service.getCharacteristic(CHAR_MODULE_STATUS);
    controlChar = await service.getCharacteristic(CHAR_SOCKET_CONTROL);
    notifyChar = await service.getCharacteristic(CHAR_NOTIFICATION);

    // Read initial module status
    const statusVal = await statusChar.readValue();
    parseModuleStatus(statusVal.buffer);

    // Subscribe to power readings (notifications every ~1 second)
    await powerChar.startNotifications();
    powerChar.addEventListener('characteristicvaluechanged', (event) => {
      const data = parsePowerReadings(event.target.value.buffer);
      updatePowerUI(data);
    });

    // Subscribe to module status changes
    await statusChar.startNotifications();
    statusChar.addEventListener('characteristicvaluechanged', (event) => {
      parseModuleStatus(event.target.value.buffer);
      log('模块状态更新');
    });

    // Sync time
    try {
      const timeChar = await service.getCharacteristic(CHAR_TIME_SYNC);
      const now = Math.floor(Date.now() / 1000);
      const buf = new Uint8Array(7);
      buf[0] = (now >> 24) & 0xFF;
      buf[1] = (now >> 16) & 0xFF;
      buf[2] = (now >> 8) & 0xFF;
      buf[3] = now & 0xFF;
      buf[4] = 8;   // Timezone: UTC+8 (China)
      buf[5] = 0;
      buf[6] = 0;
      await timeChar.writeValueWithResponse(buf);
      log(`时间已同步: ${new Date(now * 1000).toLocaleString()}`);
    } catch (e) {
      log('时间同步跳过: ' + e.message);
    }

    // Read initial power
    const powerVal = await powerChar.readValue();
    updatePowerUI(parsePowerReadings(powerVal.buffer));

    setStatus('connected', '已连接');
    log('✅ 连接成功，开始接收数据');
    renderSockets();

  } catch (error) {
    log('❌ 连接失败: ' + error.message);
    setStatus('disconnected', '未连接');
    device = null;
  }
}

function onDisconnect(event) {
  log('⚠️ 蓝牙断开 (原因: ' + (event?.target?.disconnectReason || 'unknown') + ')');
  setStatus('disconnected', '未连接');
  server = null;

  // Auto-reconnect
  if (document.getElementById('autoReconnect').checked && device) {
    log('尝试自动重连…');
    setTimeout(async () => {
      try {
        server = await device.gatt.connect();
        log('✅ 自动重连成功');
        // Re-subscribe
        service = await server.getPrimaryService(PS_SERVICE_UUID);
        powerChar = await service.getCharacteristic(CHAR_POWER_READINGS);
        statusChar = await service.getCharacteristic(CHAR_MODULE_STATUS);
        controlChar = await service.getCharacteristic(CHAR_SOCKET_CONTROL);
        notifyChar = await service.getCharacteristic(CHAR_NOTIFICATION);
        await powerChar.startNotifications();
        await statusChar.startNotifications();
        powerChar.addEventListener('characteristicvaluechanged', (e) => {
          updatePowerUI(parsePowerReadings(e.target.value.buffer));
        });
        statusChar.addEventListener('characteristicvaluechanged', (e) => {
          parseModuleStatus(e.target.value.buffer);
        });
        setStatus('connected', '已连接');
        renderSockets();
      } catch (e) {
        log('自动重连失败: ' + e.message);
      }
    }, 1000);
  } else {
    device = null;
  }
}

async function disconnect() {
  if (server?.connected) {
    await device.gatt.disconnect();
  }
  device = null;
  server = null;
  setStatus('disconnected', '未连接');
  log('已手动断开');
  renderSockets();
}

// ================================================================
// Socket Control
// ================================================================

async function toggleSocket(slotIdx) {
  if (!controlChar) {
    log('未连接设备');
    return;
  }
  const cmd = slots[slotIdx].on ? 0x00 : 0x01; // OFF : ON
  try {
    const buf = new Uint8Array([slotIdx, cmd]);
    await controlChar.writeValueWithResponse(buf);
    slots[slotIdx].on = !slots[slotIdx].on;
    log(`${slots[slotIdx].name}: ${slots[slotIdx].on ? '开启' : '关闭'}`);
    renderSockets();
  } catch (e) {
    log(`控制失败: ${e.message}`);
  }
}

// ================================================================
// Notification Push
// ================================================================

async function sendNotification() {
  const text = document.getElementById('notifyText').value.trim();
  if (!text) return;
  if (!notifyChar) { log('未连接设备'); return; }

  try {
    const encoder = new TextEncoder();
    const textBytes = encoder.encode(text);
    const buf = new Uint8Array(180);
    buf[0] = 0x00; // priority: info
    buf[1] = 10;   // display for 10 seconds
    buf[2] = 0;
    buf[3] = 0x01; // icon: message
    buf.set(textBytes.slice(0, 175), 4);
    await notifyChar.writeValueWithoutResponse(buf);
    log(`📩 已发送通知: "${text}"`);
    document.getElementById('notifyText').value = '';
  } catch (e) {
    log('发送通知失败: ' + e.message);
  }
}

// ================================================================
// Init
// ================================================================

renderSockets();
log('欢迎使用 BLE 模块化排插控制台');
log('点击 "连接设备" 开始');

// Check browser support
if (!navigator.bluetooth) {
  log('⚠️ 当前浏览器不支持 Web Bluetooth API，请使用 Chrome 或 Edge');
}
</script>

</body>
</html>
