; ============================================================
; AgentDock — AI 开发者桌面伴侣
; ============================================================
; 硬件: ESP32-S3 + ILI9341 240x320 + GL850G USB Hub
; 通信: WiFi + WebSocket (双向) + HTTP (配页面)
; ============================================================

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; USB CDC — 开发调试用
;
; AsyncTCP 看门狗 — ESP32-S3 上需关闭, 否则配网模式下会触发 WDT 重启
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CONFIG_ASYNC_TCP_USE_WDT=0
    -D USE_HSPI_PORT

; 串口监视器
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; 烧录配置
upload_protocol = esptool
upload_speed = 921600

; 依赖库
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.4
    me-no-dev/ESPAsyncWebServer@^3.3.2
    me-no-dev/AsyncTCP@^3.2.7
